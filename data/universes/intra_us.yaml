name: intra_us
description: >
  Top 100 US stocks by average daily dollar volume — highest-liquidity names
  for intraday scanning. All names trade well above $100M/day in dollar volume.
provider: yfinance
timeframe: 5m
scan_frequency: daily
min_dollar_volume: 100000000  # $100M daily minimum
symbols:
  # Mega-cap tech — highest dollar volume in the market
  - AAPL    # Apple — typically #1 by dollar volume
  - MSFT    # Microsoft
  - NVDA    # NVIDIA — extremely active on AI momentum
  - AMZN    # Amazon
  - TSLA    # Tesla — highest retail activity
